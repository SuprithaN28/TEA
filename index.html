<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Tea?</title>
<style>
  :root{
    --bg:#fff6f8;
    --card:#fff;
    --accent:#ff6b9a;
    --muted:#6b6b6b;
    --button-bg:#ff6b9a;
    --button-text:#fff;
    --gap:18px;
    --card-padding:20px;
  }

  html,body{
    height:100%;
    margin:0;
    background:linear-gradient(180deg,#fff6f8 0%, #fff 60%);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }

  .app{
    min-height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
    box-sizing:border-box;
  }

  /* card - fixed non-scrolling layout */
  .card{
    width:100%;
    max-width:460px;
    background:var(--card);
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    padding:var(--card-padding);
    display:flex;
    flex-direction:column;
    position:relative;
    height: calc(100vh - 48px); /* occupy most of viewport */
    box-sizing:border-box;
    overflow:visible;
  }

  /* scene structure: heading -> subtitle -> gif -> buttons */
  .scene{
    width:100%;
    height:100%;
    display:none;
    box-sizing:border-box;
    padding:6px;
  }
  .scene.active{display:block}

  .scene-inner{
    display:flex;
    flex-direction:column;
    height:100%;
    gap:var(--gap);
  }

  .heading-area{
    margin-top:4px;
    text-align:center;
  }
  .title{
    font-size:70px;
    font-weight:800;
    color:#0f20d9;
    line-height:1.12;
    margin:4px 6px;
  }

  /* user request: larger and bolder subtitle color */
  .subtitle{
    color:var(--accent);
    font-size:38px;
    font-weight:700;
    margin-top:2px;
    line-height:1.2;
  }

  /* center GIF and constrain size so it won't overflow */
  .hero-wrap{display:flex;justify-content:center;align-items:center;flex:1 1 auto;}
  .hero-img{
    width:88%;
    max-width:420px;
    height:auto;
    max-height:44vh;
    object-fit:cover;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,0.06);
    background:#f6f6f6;
  }

  /* buttons anchored visually below gif */
  .button-row{
    display:flex;
    gap:12px;
    justify-content:center;
    margin-top:6px;
  }
  .btn{
    flex:1 1 140px;
    min-width:120px;
    background:var(--button-bg);
    color:var(--button-text);
    padding:14px 18px;
    border-radius:12px;
    border:none;
    font-size:17px;
    font-weight:700;
    box-shadow:0 6px 14px rgba(255,107,154,0.22);
    transition:transform .12s ease,box-shadow .12s ease;
    touch-action:manipulation;
  }
  .btn.secondary{background:#fff;border:2px solid #eee;color:#333;box-shadow:none}
  .btn:active{transform:scale(.96)}

  /* floating hearts layer */
  .float-layer{position:absolute;inset:0;pointer-events:none;z-index:2}
  .float-heart{position:absolute;width:18px;height:18px;background:var(--accent);transform:rotate(45deg);border-radius:3px 3px 0 0;opacity:.9;filter:drop-shadow(0 4px 10px rgba(255,107,154,.18));}
  .float-heart::before,.float-heart::after{content:"";position:absolute;background:var(--accent);width:18px;height:18px;border-radius:50%}
  .float-heart::before{left:-9px;top:0}
  .float-heart::after{top:-9px;left:0}
  @keyframes floatUp{0%{transform:translateY(12px) scale(.95);opacity:0}20%{opacity:1}100%{transform:translateY(-140px) scale(1.05);opacity:0}}

  /* wobble */
  .wobble{display:inline-block;animation:wobble 1.6s ease-in-out infinite}
  @keyframes wobble{0%{transform:translateY(0)}50%{transform:translateY(-6px)}100%{transform:translateY(0)}}

  /* simple confetti / vignette / tears */
  .confetti-piece{position:absolute;width:8px;height:14px;border-radius:2px;opacity:0;pointer-events:none}
  .vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center, rgba(0,0,0,0) 50%, rgba(0,0,0,0.45) 100%);opacity:0;transition:opacity .6s;pointer-events:none}
  .vignette.show{opacity:1}
  .tear{position:absolute;width:6px;height:10px;background:rgba(0,120,200,.14);border-radius:3px;filter:blur(.2px);opacity:0;animation:fall 2s linear infinite}
  @keyframes fall{0%{transform:translateY(-10px);opacity:1}100%{transform:translateY(220px);opacity:0}}

  @media(min-width:520px){
    .card{padding:28px;height: calc(100vh - 56px)}
    .title{font-size:24px}
    .hero-img{max-height:40vh}
    .btn{font-size:18px}
  }
</style>
</head>
<body>
<div class="app">
  <div class="card" role="main" aria-live="polite">
    <div class="float-layer" id="floatLayer"></div>

    <!-- Screen 1: heading -> subtitle -> gif -> buttons -->
    <section id="s1" class="scene active" data-screen="1">
      <div class="scene-inner">
        <div class="heading-area">
          <div class="title">Bubumaa... Tea bekaa??</div>
          <div class="subtitle">☕️☕️☕️☕️☕️</div>
        </div>

        <div class="hero-wrap">
          <img class="hero-img" id="img-s1" alt="asset_tea_question" src="tea.webp">
        </div>

        <div class="button-row">
          <button class="btn" data-action="yes" id="s1-yes">Yes</button>
          <button class="btn secondary dodge" data-action="no" id="s1-no" aria-label="No">No</button>
        </div>
      </div>
    </section>

    <!-- Screen 1B -->
    <section id="s1b" class="scene" data-screen="1B">
      <div class="scene-inner">
        <div class="heading-area">
          <div class="title wobble">nijvaglu bedva...??</div>
          <div class="subtitle">🥺🥺🥺</div>
        </div>

        <div class="hero-wrap">
          <img class="hero-img" id="img-s1b" alt="asset_consider_again_sad" src="puppy.webp">
        </div>

        <div class="button-row">
          <button class="btn" data-action="yes" id="s1b-yes">Yes</button>
          <button class="btn secondary dodge" data-action="no" id="s1b-no">No</button>
        </div>
      </div>
    </section>

    <!-- Screen 2 -->
    <section id="s2" class="scene" data-screen="2">
      <div class="scene-inner">
        <div class="heading-area">
          <div class="title">Great!</div>
          <div class="subtitle">Madkodtiya nangeee</div>
        </div>

        <div class="hero-wrap">
          <img class="hero-img" id="img-s2" alt="asset_make_tea_request" src="please.webp">
        </div>

        <div class="button-row">
          <button class="btn" data-action="yes" id="s2-yes">Yes</button>
          <button class="btn secondary" data-action="no" id="s2-no">No</button>
        </div>
      </div>
    </section>

    <!-- Screen 3 -->
    <section id="s3" class="scene" data-screen="3">
      <div class="scene-inner">
        <div class="heading-area">
          <div class="title">Thanks!</div>
          <div class="subtitle"></div>
        </div>

        <div class="hero-wrap">
          <img class="hero-img" id="img-s3" alt="asset_thanks_celebrate" src="yes.webp">
        </div>

        <div class="button-row">
          <button class="btn" id="s3-replay">Replay</button>
        </div>
      </div>
    </section>

    <!-- Screen 3B -->
    <section id="s3b" class="scene" data-screen="3B">
      <div class="scene-inner">
        <div class="heading-area">
          <div class="title">Fine… I’ll go prepare it.</div>
          <div class="subtitle"></div>
        </div>

        <div class="hero-wrap">
          <img class="hero-img" id="img-s3b" alt="asset_fine_ill_prepare_sad" src="angry.webp">
        </div>

        <div class="button-row">
          <button class="btn" id="s3b-restart">Restart</button>
        </div>
      </div>
    </section>

    <!-- Screen 4 -->
    <section id="s4" class="scene" data-screen="4">
      <div class="scene-inner">
        <div class="heading-area">
          <div class="title" style="white-space:pre-line">Fine… I’ll drink tea alone...<br>forever!</div>
          <div class="subtitle"></div>
        </div>

        <div class="hero-wrap">
          <img class="hero-img" id="img-s4" alt="asset_drink_alone_forever_sad" src="final_no.webp">
        </div>

        <div class="button-row">
          <button class="btn" id="s4-mind">I changed my mind</button>
          <button class="btn secondary" id="s4-restart">Restart</button>
        </div>

        <div class="vignette" id="vignette"></div>
      </div>
    </section>

    <div id="confetti"></div>
  </div>
</div>

<!-- Optional sounds -->
<audio id="sound-yes" src="asset_yes_chime.mp3" preload="auto"></audio>
<audio id="sound-no" src="asset_no_trombone.mp3" preload="auto"></audio>

<script>
(function(){
  const screens = {
    '1': document.getElementById('s1'),
    '1B': document.getElementById('s1b'),
    '2': document.getElementById('s2'),
    '3': document.getElementById('s3'),
    '3B': document.getElementById('s3b'),
    '4': document.getElementById('s4')
  };
  const sounds = { yes: document.getElementById('sound-yes'), no: document.getElementById('sound-no') };

  function show(screenId){
    Object.values(screens).forEach(s => s.classList.remove('active'));
    const s = screens[String(screenId)];
    if(!s) return;
    s.classList.add('active');
    handleEnterScreen(screenId);
  }

  function feedback(type){
    try{ if(navigator.vibrate) navigator.vibrate(type==='yes'?20:40) }catch(e){}
    const audio = type==='yes'?sounds.yes:sounds.no;
    if(audio && audio.play){ audio.currentTime = 0; audio.play().catch(()=>{}); }
  }

  function confettiBurst(count=18){
    const c = document.getElementById('confetti'); c.innerHTML='';
    const colors = ['#ff6b9a','#ffd166','#9ad0ff','#b0ffb3','#f7a1ff'];
    for(let i=0;i<count;i++){
      const el = document.createElement('div'); el.className='confetti-piece';
      el.style.background = colors[i%colors.length];
      el.style.left = (20 + Math.random()*60) + '%';
      el.style.top = '12%';
      c.appendChild(el);
      (function(e){
        const dx = (Math.random()*160-80);
        const dy = 220 + Math.random()*120;
        const dur = 900 + Math.random()*900;
        e.animate([{transform:`translateY(0) rotate(0deg)`, opacity:1},{transform:`translate(${dx}px, ${dy}px) rotate(${Math.random()*720}deg)`, opacity:0}],{duration:dur, easing:'cubic-bezier(.2,.8,.2,1)',fill:'forwards'});
      })(el);
    }
    setTimeout(()=>{ c.innerHTML=''; },1800);
  }

  const floatLayer = document.getElementById('floatLayer'); let heartsTimer=null;
  function spawnHearts(n=6, slow=false){
    clearHearts();
    for(let i=0;i<n;i++){
      const el=document.createElement('div'); el.className='float-heart';
      el.style.left = (10 + Math.random()*80) + '%';
      el.style.top = (55 + Math.random()*30) + '%';
      el.style.opacity = (0.6 + Math.random()*0.4);
      const delay = Math.random()*800;
      const duration = (2000 + Math.random()*1600) * (slow?1.6:1);
      el.style.animation = `floatUp ${duration}ms ease-in ${delay}ms both`;
      floatLayer.appendChild(el);
    }
    heartsTimer = setInterval(()=>{ spawnHearts(n, slow); }, 2800 * (slow?1.8:1));
  }
  function clearHearts(){ clearInterval(heartsTimer); heartsTimer = null; floatLayer.innerHTML = ''; }

  function spawnTears(n=5){
    removeTears();
    const card = document.querySelector('.card');
    for(let i=0;i<n;i++){
      const t = document.createElement('div'); t.className='tear';
      t.style.left = (15 + Math.random()*70) + '%';
      t.style.top = (8 + Math.random()*30) + '%';
      t.style.animationDelay = (Math.random()*1200) + 'ms';
      t.style.animationDuration = (1800 + Math.random()*1200) + 'ms';
      card.appendChild(t);
    }
  }
  function removeTears(){ document.querySelectorAll('.tear').forEach(t=>t.remove()); }

  function handleEnterScreen(id){
    document.getElementById('vignette').classList.remove('show');
    if(id==='1'){ spawnHearts(8); } else { clearHearts(); }
    if(id==='1B'){ spawnHearts(5,true); }
    if(id==='3'){ confettiBurst(); feedback('yes'); }
    if(id==='3B'){ feedback('no'); }
    if(id==='4'){ document.getElementById('vignette').classList.add('show'); spawnTears(6); feedback('no'); } else { removeTears(); }
  }

  function makeDodge(btn){
    const parent = btn.parentElement;
    let lastMove=0;
    function attemptDodge(){
      const active = document.querySelector('.scene.active');
      if(!active || (active.id !== 's1' && active.id !== 's1b')) return;
      if(Date.now() - lastMove < 220) return;
      lastMove = Date.now();
      const rect = parent.getBoundingClientRect();
      const btnRect = btn.getBoundingClientRect();
      const maxOffsetX = Math.min(96, Math.max(32, rect.width - btnRect.width - 12));
      const maxOffsetY = 10;
      const dirX = (Math.random() > 0.5)?1:-1;
      const offsetX = dirX * (22 + Math.random() * (maxOffsetX/1.6));
      const offsetY = (Math.random()-0.5) * maxOffsetY;
      btn.style.transition = 'transform .22s cubic-bezier(.2,.9,.2,1)';
      btn.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
      setTimeout(()=>{ btn.style.transform=''; }, 520);
      feedback('no');
    }
    btn.addEventListener('mouseenter', attemptDodge);
    btn.addEventListener('touchstart', attemptDodge, {passive:true});
  }
  document.querySelectorAll('.dodge').forEach(makeDodge);

  document.addEventListener('click', function(e){
    const btn = e.target.closest('button'); if(!btn) return;
    if(btn.id === 's1-yes' || btn.id === 's1b-yes'){ show(2); feedback('yes'); return; }
    if(btn.id === 's1-no'){ show('1B'); feedback('no'); return; }
    if(btn.id === 's1b-no'){ show(4); feedback('no'); return; }
    if(btn.id === 's2-yes'){ show(3); feedback('yes'); return; }
    if(btn.id === 's2-no'){ show('3B'); feedback('no'); return; }
    if(btn.id === 's3-replay'){ show(1); return; }
    if(btn.id === 's3b-restart' || btn.id === 's4-restart'){ show(1); return; }
    if(btn.id === 's4-mind'){ show(2); feedback('yes'); return; }
  });

  document.querySelectorAll('.btn').forEach(b=>{
    b.addEventListener('mouseover', ()=>{ b.style.transform='scale(1.03)'; });
    b.addEventListener('mouseout', ()=>{ b.style.transform=''; });
    b.addEventListener('touchstart', ()=>{ b.style.transform='scale(.98)'; setTimeout(()=>b.style.transform='',160); }, {passive:true});
  });

  show(1);

  // keyboard accessibility (Enter)
  document.addEventListener('keydown', (e)=>{ if(e.key === 'Enter'){ const active = document.querySelector('.scene.active'); const firstBtn = active.querySelector('button'); if(firstBtn) firstBtn.click(); }});
})();
</script>
</body>
</html>
